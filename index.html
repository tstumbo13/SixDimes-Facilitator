<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#005467">
<title>Six Dimes Facilitator</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<style>
:root{
  --bg:#EFF8FA; --card:#FFFFFF; --ink:#0B3945; --sub:#48707B; --faint:#7FA0A9;
  --line:#D8EAEE; --teal:#005467; --teal-soft:#DFF2F5; --teal-mid:#1997A5;
  --amber:#1997A5; --amber-soft:#D9F1F4; --coral:#B4552D; --coral-soft:#F7E5DC;
  --radius:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{margin:0; background:var(--bg); color:var(--ink);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  line-height:1.55; padding-bottom:calc(76px + env(safe-area-inset-bottom));}
h1,h2,h3{line-height:1.25; margin:0 0 .4rem}
h1{font-size:1.45rem; font-weight:700}
h2{font-size:1.15rem; font-weight:700}
h3{font-size:.95rem; font-weight:600}
p{margin:.3rem 0}
button{font-family:inherit}
.wrap{max-width:560px; margin:0 auto; padding:18px 16px 30px}
.card{background:var(--card); border:1px solid var(--line); border-radius:var(--radius); padding:16px; margin:0 0 14px}
.btn{display:block; width:100%; border:none; border-radius:12px; padding:14px 16px; font-size:1rem; font-weight:600; cursor:pointer; background:var(--teal); color:#fff}
.btn.sec{background:transparent; color:var(--teal); border:1.5px solid var(--teal)}
.btn.small{width:auto; display:inline-block; padding:8px 14px; font-size:.85rem; border-radius:9px}
.btn:active{transform:scale(.985)}
.muted{color:var(--sub); font-size:.9rem}
.tiny{color:var(--faint); font-size:.78rem}
.chip{display:inline-block; background:var(--teal-soft); color:var(--teal); border-radius:99px; padding:4px 12px; font-size:.8rem; font-weight:600}
textarea,input[type=text],select{width:100%; border:1px solid var(--line); border-radius:10px; padding:10px 12px; font-family:inherit; font-size:.95rem; color:var(--ink); background:#FDFBF7; margin-top:6px}
textarea{min-height:64px; resize:vertical}
textarea.tall{min-height:110px}
textarea:focus,input:focus,select:focus{outline:2px solid var(--teal-mid); border-color:transparent}
label.f{display:block; margin:12px 0 0; font-size:.88rem; font-weight:600; color:var(--ink)}
label.f .hint{font-weight:400; color:var(--sub)}
.topbar{position:sticky; top:0; z-index:20; background:var(--bg); padding:14px 16px 10px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line)}
.topbar .back{background:none; border:none; font-size:1rem; color:var(--teal); font-weight:600; cursor:pointer; padding:4px 8px 4px 0}
.topbar h2{flex:1; margin:0; font-size:1.02rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
nav{position:fixed; bottom:0; left:0; right:0; background:var(--card); border-top:1px solid var(--line); display:flex; z-index:30; padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1; background:none; border:none; padding:10px 4px 8px; font-size:.7rem; color:var(--faint); cursor:pointer; font-weight:600}
nav button.on{color:var(--teal)}
nav button svg{display:block; margin:0 auto 3px; width:22px; height:22px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round}
.coinrail{display:flex; gap:7px; align-items:center; justify-content:center; margin:6px 0 2px}
.coin{width:34px; height:34px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:.62rem; font-weight:700; border:2px dashed var(--line); color:var(--faint); background:#FDFBF7}
.coin.earned{border:none; background:#29BCC7; color:#063E4B; box-shadow:inset 0 0 0 2.5px #7FDCE4}
.coin.nickel{width:29px; height:29px}
.coin.nickel.earned{background:#005467; color:#fff; box-shadow:inset 0 0 0 2.5px #33798C}
.path{display:grid; grid-template-columns:repeat(5,1fr); gap:10px; margin-top:12px}
.stone{aspect-ratio:1; border-radius:50%; border:1px solid var(--line); background:var(--card); display:flex; flex-direction:column; align-items:center; justify-content:center; font-size:.8rem; font-weight:700; color:var(--faint); cursor:pointer; position:relative}
.stone.done{background:var(--teal); border-color:var(--teal); color:#fff}
.stone.next{border:2.5px solid var(--amber); color:var(--amber)}
.stone.locked{opacity:.55}
.stone .cn{font-size:.55rem; font-weight:600; margin-top:1px}
.sect{margin:18px 0 6px; display:flex; align-items:center; gap:8px}
.sect h3{margin:0; font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; color:var(--sub)}
.sect:before{content:""; width:18px; height:2px; background:var(--amber); border-radius:2px}
.story{font-size:1rem; line-height:1.65}
.quote{border-left:3px solid var(--amber); padding:6px 0 6px 14px; margin:14px 0; font-style:italic; font-size:1.02rem}
.quote .who{display:block; font-style:normal; font-size:.8rem; color:var(--sub); margin-top:6px}
.rowcard{border:1px solid var(--line); border-radius:10px; padding:10px 12px; margin-top:10px; background:#FDFBF7}
.rowcard .rn{font-size:.72rem; font-weight:700; color:var(--amber)}
.qitem{margin:14px 0 0}
.qitem .qq{font-size:.95rem; font-weight:600}
.crisis{background:var(--coral-soft); border:1px solid #E8C9B8; border-radius:var(--radius); padding:14px 16px; margin:14px 0}
.crisis h3{color:var(--coral)}
.bigco{width:74px;height:74px;border-radius:50%;background:#29BCC7;box-shadow:inset 0 0 0 5px #7FDCE4;display:flex;align-items:center;justify-content:center;color:#063E4B;font-weight:800;font-size:1.05rem;margin:0 auto 12px}
.overlay{position:fixed; inset:0; background:rgba(43,38,32,.55); z-index:50; display:flex; align-items:center; justify-content:center; padding:24px}
.modal{background:var(--card); border-radius:18px; padding:26px 22px; max-width:340px; width:100%; text-align:center}
.trackopt{display:block; width:100%; text-align:left; background:var(--card); border:1.5px solid var(--line); border-radius:var(--radius); padding:14px 16px; margin:10px 0; cursor:pointer; font-size:.95rem}
.trackopt b{display:block; font-size:1rem}
.trackopt.on{border-color:var(--teal); background:var(--teal-soft)}
.trackopt span{color:var(--sub); font-size:.85rem}
.done-badge{display:inline-block; background:var(--teal-soft); color:var(--teal); font-size:.75rem; font-weight:700; border-radius:99px; padding:3px 10px}
.jentry{border-bottom:1px solid var(--line); padding:12px 2px}
.jentry:last-child{border:none}
.jdate{font-size:.72rem; color:var(--faint); font-weight:600; text-transform:uppercase; letter-spacing:.05em}
.progressbar{height:6px; background:var(--line); border-radius:3px; overflow:hidden; margin:10px 0 4px}
.progressbar div{height:100%; background:var(--amber); border-radius:3px; transition:width .4s}
.ideacard{border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-top:10px; background:var(--card)}
.ideacard b{color:var(--teal)}
a{color:var(--teal-mid)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app"></div>
<nav id="nav" class="hidden">
  <button data-v="home"><svg viewBox="0 0 24 24"><path d="M5 12l7-8 7 8M6 10v9h4v-5h4v5h4v-9"/></svg>Journey</button>
  <button data-v="journal"><svg viewBox="0 0 24 24"><path d="M6 3h12a1 1 0 011 1v16a1 1 0 01-1 1H6a1 1 0 01-1-1V4a1 1 0 011-1zM9 3v18M13 8h3M13 12h3"/></svg>Journal</button>
  <button data-v="mywork"><svg viewBox="0 0 24 24"><path d="M9 5h6M9 5a2 2 0 00-2 2v12a2 2 0 002 2h6a2 2 0 002-2V7a2 2 0 00-2-2M9 5a2 2 0 012-2h2a2 2 0 012 2M9 12l2 2 4-4"/></svg>My work</button>
  <button data-v="support"><svg viewBox="0 0 24 24"><path d="M12 20s-7-4.5-9-9c-1.2-2.8.8-6 4-6 2 0 3.5 1.2 5 3 1.5-1.8 3-3 5-3 3.2 0 5.2 3.2 4 6-2 4.5-9 9-9 9z"/></svg>Support</button>
</nav>
<script>
window.CURRICULUM = {"sessions": [{"num": 1, "chapter": "Preface", "title": "The Question That Starts Change", "checkin": "In one sentence: if a stranger took over your life tomorrow, what is the very first thing they would change?", "discussion": ["What feelings came up when you answered the opening question? (Not the answer itself — the feelings.)", "Name a change you've wanted to make for years. What has kept you from making it?", "Has a story — a book, a movie, a testimony at a meeting — ever changed you? What made it land?", "What does 'outside your comfort zone' look like for you in this phase of treatment?", "If fear is the reason we don't change, what is fear protecting you from?"], "cbt": "Fear Inventory: Draw a 3-column thought record — (1) The change I know I need to make, (2) The feared outcome if I make it, (3) The evidence for/against that fear. Share one row in pairs.", "step": "Step 1 orientation: 'We admitted we were powerless over alcohol — that our lives had become unmanageable.' Clear's question often surfaces the unmanageability.", "safety": "Some guests' honest answer may involve a person or setting they are not yet safe to discuss. Offer: 'You can answer silently on the page if you're not ready to say it out loud.' Do not press for disclosure.", "practice": "Journal for 10 minutes tonight on Clear's question. Bring one observation back to next session.", "quote": "Nothing big ever happens in comfort zones.", "attrib": "Damon West, Preface", "story": "Damon West opens the book with a question borrowed from habits researcher James Clear: if someone took control of your life tomorrow, what is the very first thing they would change? The Preface argues that the honest answer to that question reveals what each of us already knows we need to change — and that the reason we haven't is usually fear.", "value": "Courage over comfort", "valueDesc": "Change starts where the comfort zone ends.", "ex": {"note": "Your fear inventory. One row per change you know you need to make.", "blocks": [{"k": "rows", "n": 3, "cols": [{"l": "The change I know I need to make"}, {"l": "The feared outcome if I make it"}, {"l": "Evidence for / against that fear"}]}]}, "bookPage": 13, "fac": {"why": "The chapter's central tension — change is resisted because it moves us outside the comfort zone — but growth lives outside the comfort zone — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Preface (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Preface of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: Damon West opens the book with a question borrowed from habits researcher James Clear: if someone took control of your life tomorrow, what is the very first thing they would change? The Preface argues that the honest answer to that question reveals what each of us already knows we need to change — and that the reason we haven't is usually fear.\"", "Read the chapter's anchor quote: \"Nothing big ever happens in comfort zones.\" (Damon West, Preface)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"In one sentence: if a stranger took over your life tomorrow, what is the very first thing they would change?\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Fear Inventory", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Preface gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Draw a 3-column thought record — (1) The change I know I need to make, (2) The feared outcome if I make it, (3) The evidence for/against that fear. Share one row in pairs.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What feelings came up when you answered the opening question? (Not the answer itself — the feelings.)", "• Name a change you've wanted to make for years. What has kept you from making it?", "• Has a story — a book, a movie, a testimony at a meeting — ever changed you? What made it land?", "• What does 'outside your comfort zone' look like for you in this phase of treatment?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Preface is worth carrying out the door: \"Nothing big ever happens in comfort zones.\" (Damon West, Preface). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Some clients' honest answer may involve a person or setting they are not yet safe to discuss. Offer: 'You can answer silently on the page if you're not ready to say it out loud.' Do not press for disclosure.", "docPrompt": "Intervention: 90-minute open process group anchored on Preface of Damon West's Six Dimes and a Nickel. Theme: The Question That Starts Change. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Fear Inventory) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 4 (Readiness to Change); Dimension 5 (Relapse/Continued Use Potential). / Note each client's articulated 'first change' as an initial IRP data point under Dimension 4 (readiness). Flag any disclosures that may indicate trauma history requiring individual follow-up.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Preface's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 2, "chapter": "Prologue: Relationships Are Everything", "title": "Relationships Are Everything", "checkin": "Name one person whose trust you have damaged because of your substance use. You do not have to say why — just the role (mother, boss, daughter).", "discussion": ["What is one 'next right thing' you can do today that your past self would not have done?", "Whose trust do you most want back? What would a realistic first step look like?", "Have you ever had to rebuild trust with someone before? What worked — and what didn't?", "What is the 'sword above your neck' in your life right now, and how do you want to relate to it?", "Who is the 'Lucy Fato' in your recovery — the person who is going to vouch for you when no one else will?"], "cbt": "Behavior Chain: Pick one relationship you want to repair. Write 5 specific next-right-thing behaviors you can do this week that, stacked, signal trustworthiness (show up on time, keep a phone call, pay back $20, don't lie about X, reply within 24 hours). Rate the effort of each 1–10.", "step": "Step 12: 'Having had a spiritual awakening... we tried to carry this message to alcoholics, and to practice these principles in all our affairs.' Small right actions in relationships are where principles become practice.", "safety": "For guests with histories of relational trauma, 'trust' can feel unsafe or coercive. Reframe: you are not required to trust anyone back; the work is whether you want to be trustworthy — a separate question.", "practice": "Each evening this week, write down one 'next right thing' you did. Bring the list to group.", "quote": "Earned trust is everything.", "attrib": "Damon West, Prologue", "story": "Fourteen years after a SWAT team arrested him in Dallas, Damon sits in the United lounge at Heathrow with his wife and stepdaughter, having just finished speaking to UK risk managers and prison-reform advocates. The trip was only possible because a woman named Lucy Fato vouched for him. He reflects that being on parole for life is like living with a sword above your neck — the discipline is to respect it but not fear it. Everything he now has rests on earned trust, one small next-right-thing at a time.", "value": "Earned trust", "valueDesc": "Trust isn't asked for. It's rebuilt one right action at a time.", "ex": {"note": "Pick one relationship you want to repair. Five next-right-thing behaviors this week.", "blocks": [{"k": "field", "l": "The relationship I want to repair"}, {"k": "rows", "n": 5, "cols": [{"l": "Next-right-thing behavior"}, {"l": "Effort (1–10)", "t": "num"}]}]}, "bookPage": 19, "fac": {"why": "The chapter's central tension — trust is earned in small deposits and withdrawn in one large betrayal — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Prologue: Relationships Are Everything (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Prologue: Relationships Are Everything of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: Fourteen years after a SWAT team arrested him in Dallas, Damon sits in the United lounge at Heathrow with his wife and stepdaughter, having just finished speaking to UK risk managers and prison-reform advocates. The trip was only possible because a woman named Lucy Fato vouched for him. He reflects that being on parole for life is like living with a sword above your neck — the discipline is to respect it but not fear it. Everything he now has rests on earned trust, one small next-right-thing at a time.\"", "Read the chapter's anchor quote: \"Earned trust is everything.\" (Damon West, Prologue)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"Name one person whose trust you have damaged because of your substance use. You do not have to say why — just the role (mother, boss, daughter).\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Behavior Chain", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Prologue: Relationships Are Everything gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Pick one relationship you want to repair. Write 5 specific next-right-thing behaviors you can do this week that, stacked, signal trustworthiness (show up on time, keep a phone call, pay back $20, don't lie about X, reply within 24 hours). Rate the effort of each 1–10.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What is one 'next right thing' you can do today that your past self would not have done?", "• Whose trust do you most want back? What would a realistic first step look like?", "• Have you ever had to rebuild trust with someone before? What worked — and what didn't?", "• What is the 'sword above your neck' in your life right now, and how do you want to relate to it?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Prologue: Relationships Are Everything is worth carrying out the door: \"Earned trust is everything.\" (Damon West, Prologue). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "For clients with histories of relational trauma, 'trust' can feel unsafe or coercive. Reframe: you are not required to trust anyone back; the work is whether you want to be trustworthy — a separate question.", "docPrompt": "Intervention: 90-minute open process group anchored on Prologue: Relationships Are Everything of Damon West's Six Dimes and a Nickel. Theme: Relationships Are Everything. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Behavior Chain) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 6 (Recovery Environment); Dimension 4 (Readiness to Change). / Document client-identified relational goals for the IRP. Note protective vs. risky relationships in the recovery environment (Dimension 6).", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Prologue: Relationships Are Everything's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 3, "chapter": "Chapter 1: You Are the Sum of the People Around You", "title": "You Are the Sum of the People Around You", "checkin": "Name three people you spent the most time with in the 6 months before treatment. You don't have to judge them — just list them.", "discussion": ["Looking at your list, how many are in active use? How many know you're in treatment?", "What would your life look like if you replaced the most harmful person on that list with the most supportive?", "When the 'SWAT team of your life' showed up (whatever the event), what did it cost you — and what did it give you?", "What makes it hard to leave a using crowd — even when you want to?", "Who is one new person you could spend time with this week who is in recovery?"], "cbt": "Network Map: Draw yourself in the center. Draw 5-8 spokes out to the people you spend the most time with. Label each: Recovery-Supportive (+), Neutral (0), Active-Using or High-Risk (–). Circle who you want to move closer and who you want to move further away.", "step": "The fellowship itself is the answer to this chapter. A home group is the deliberate construction of a new 'sum.'", "safety": "Some guests' 'crowd' is family — cutting ties may not be possible. Focus on functional boundaries rather than physical removal.", "practice": "Attend one 12-step meeting or SMART Recovery meeting this week and introduce yourself to one person.", "quote": "Angels are all around us.", "attrib": "Damon West, Ch. 1", "story": "July 30, 2008. Damon hasn't slept in days — meth will do that. His burglary partner Dustin was picked up ten days ago, and Damon knows it's only a matter of time. A stun grenade comes through the window, and a Dallas SWAT team pours in. Looking back, he says: that moment wasn't the worst day of his life — it was the day he was rescued. He had surrounded himself with people who led him toward theft, lies, and meth pipes. Transformation required finding a new crowd and being a trustworthy member of it.", "value": "Choose your people", "valueDesc": "You become the average of the people you spend your time with.", "ex": {"note": "Your network map. The people you spend the most time with — and which direction each one pulls.", "blocks": [{"k": "rows", "n": 6, "cols": [{"l": "Person (role or initials)"}, {"l": "Direction", "t": "sel", "o": ["Recovery-supportive (+)", "Neutral (0)", "Active-using / high-risk (–)"]}, {"l": "Closer or further?", "t": "sel", "o": ["Move closer", "Keep as is", "Move further away"]}]}]}, "bookPage": 31, "fac": {"why": "The chapter's central tension — you become the average of the five or six people you spend the most time with — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 1: You Are the Sum of the People Around You (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 1: You Are the Sum of the People Around You of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: July 30, 2008. Damon hasn't slept in days — meth will do that. His burglary partner Dustin was picked up ten days ago, and Damon knows it's only a matter of time. A stun grenade comes through the window, and a Dallas SWAT team pours in. Looking back, he says: that moment wasn't the worst day of his life — it was the day he was rescued. He had surrounded himself with people who led him toward theft, lies, and meth pipes. Transformation required finding a new crowd and being a trustworthy member of it.\"", "Read the chapter's anchor quote: \"Angels are all around us.\" (Damon West, Ch. 1)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"Name three people you spent the most time with in the 6 months before treatment. You don't have to judge them — just list them.\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Network Map", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Chapter 1: You Are the Sum of the People Around You gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Draw yourself in the center. Draw 5-8 spokes out to the people you spend the most time with. Label each: Recovery-Supportive (+), Neutral (0), Active-Using or High-Risk (–). Circle who you want to move closer and who you want to move further away.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• Looking at your list, how many are in active use? How many know you're in treatment?", "• What would your life look like if you replaced the most harmful person on that list with the most supportive?", "• When the 'SWAT team of your life' showed up (whatever the event), what did it cost you — and what did it give you?", "• What makes it hard to leave a using crowd — even when you want to?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 1: You Are the Sum of the People Around You is worth carrying out the door: \"Angels are all around us.\" (Damon West, Ch. 1). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Some clients' 'crowd' is family — cutting ties may not be possible. Focus on functional boundaries rather than physical removal.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 1: You Are the Sum of the People Around You of Damon West's Six Dimes and a Nickel. Theme: You Are the Sum of the People Around You. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Network Map) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 6 (Recovery Environment); Dimension 5 (Relapse Potential). / Update IRP Dimension 6 with client-identified high-risk contacts and a written plan for reducing exposure.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 1: You Are the Sum of the People Around You's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 4, "chapter": "Chapter 2: Always Ask the Question", "title": "Always Ask the Question", "checkin": "Name something you want in your life right now that you have not asked anyone for — because you're sure they'll say no.", "discussion": ["What does shame-based silence cost you more: the chance you'd get if you asked, or the self-respect lost when you don't?", "When have you asked for something hard and been surprised by the answer?", "What does 'staying ready' look like in treatment (reading, preparing a resume, staying sober) so you can seize an opportunity?", "Who is a person you need to ask a hard question of — a parent, a sponsor, a probation officer, a spouse?", "How do you tell the difference between healthy assertiveness and old grandiosity?"], "cbt": "The Ask Worksheet: Name the request. Name the feared no. Name the worst realistic outcome. Name the best realistic outcome. Decide which outcome is more painful — asking and being told no, or never asking. Make a plan for when and how.", "step": "'How It Works' suggests rigorous honesty and courage — asking for help is both.", "safety": "For guests with histories of coercion or punishment for asking, this chapter can surface trauma. Offer the option to rehearse requests in session before making them in the real world.", "practice": "Make one 'ask' this week. Note what you asked, how you felt before, what you got, and how you felt after.", "quote": "You miss one hundred percent of the shots you do not take.", "attrib": "Wayne Gretzky, as quoted by Damon West in Ch. 2", "story": "Five years out of prison, Damon is sitting in Nick Saban's office in Tuscaloosa having asked the legendary coach — cold — for an endorsement video. He describes how after walking out of a Texas prison with nothing, he got his first white-collar job at the Provost Umphrey Law Firm because the owner read the legal writ Damon wrote for himself in prison and was impressed enough to offer him work. Every door that opened began with Damon asking, even when he was sure he'd hear no.", "value": "Ask for what you need", "valueDesc": "Shame keeps you silent. Courage asks anyway.", "ex": {"blocks": [{"k": "field", "l": "The request — what I actually want to ask for"}, {"k": "field", "l": "The feared no — what I'm afraid they'll say"}, {"k": "field", "l": "Worst realistic outcome"}, {"k": "field", "l": "Best realistic outcome"}, {"k": "field", "l": "Which is more painful — asking and hearing no, or never asking?"}, {"k": "field", "l": "My plan — when and how I'll ask"}]}, "bookPage": 39, "fac": {"why": "The chapter's central tension — the only question that always gets a no is the one you never ask — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 2: Always Ask the Question (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 2: Always Ask the Question of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: Five years out of prison, Damon is sitting in Nick Saban's office in Tuscaloosa having asked the legendary coach — cold — for an endorsement video. He describes how after walking out of a Texas prison with nothing, he got his first white-collar job at the Provost Umphrey Law Firm because the owner read the legal writ Damon wrote for himself in prison and was impressed enough to offer him work. Every door that opened began with Damon asking, even when he was sure he'd hear no.\"", "Read the chapter's anchor quote: \"You miss one hundred percent of the shots you do not take.\" (Wayne Gretzky, as quoted by Damon West in Ch. 2)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"Name something you want in your life right now that you have not asked anyone for — because you're sure they'll say no.\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — The Ask Worksheet", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Chapter 2: Always Ask the Question gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Name the request. Name the feared no. Name the worst realistic outcome. Name the best realistic outcome. Decide which outcome is more painful — asking and being told no, or never asking. Make a plan for when and how.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What does shame-based silence cost you more: the chance you'd get if you asked, or the self-respect lost when you don't?", "• When have you asked for something hard and been surprised by the answer?", "• What does 'staying ready' look like in treatment (reading, preparing a resume, staying sober) so you can seize an opportunity?", "• Who is a person you need to ask a hard question of — a parent, a sponsor, a probation officer, a spouse?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 2: Always Ask the Question is worth carrying out the door: \"You miss one hundred percent of the shots you do not take.\" (Wayne Gretzky, as quoted by Damon West in Ch. 2). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "For clients with histories of coercion or punishment for asking, this chapter can surface trauma. Offer the option to rehearse requests in session before making them in the real world.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 2: Always Ask the Question of Damon West's Six Dimes and a Nickel. Theme: Always Ask the Question. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (The Ask Worksheet) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 4 (Readiness); Dimension 6 (Recovery Environment). / Document the specific assertive-communication skill practiced and the client's stated outcome.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 2: Always Ask the Question's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 5, "chapter": "Chapter 3: Two Kinds of Adversity in Life", "title": "Two Kinds of Adversity", "checkin": "On a scale of 1-10, how honest have you been with yourself this week about your part in what brought you here?", "discussion": ["What adversity in your life was created for you — by others, by circumstance, by illness?", "What adversity did you create with your own choices?", "Where is the line between accountability and shame for you? How do you stay on the accountability side?", "What lie did you believe about your using that eventually fell apart?", "What is one promise you can make to yourself this week — and keep — to rebuild confidence?"], "cbt": "Accountability Column Exercise: Draw two columns labeled 'Mine to Own' and 'Not Mine to Own.' List 10 hard things from the last year. Sort them. Notice what happens to shame when the lists are separated.", "step": "Step 1 ('unmanageable') and Step 4 ('searching and fearless moral inventory') both live here.", "safety": "Guests with trauma histories may have been told everything was their fault. The 'Not Mine to Own' column is equally important to the exercise. Make sure it has entries.", "practice": "Keep one small promise to yourself daily this week — make your bed, attend group on time, drink water. Track it.", "quote": "Living in reality is always better than living in a lie.", "attrib": "Damon West, Ch. 3", "story": "May 18, 2009. Dallas County sentences Damon to 65 years in prison — 'six dimes and a nickel.' The judge who imposes the sentence is a man Damon had known socially in his pre-addiction life. Damon makes no excuses. He distinguishes between adversity life hands you (cancer, job loss, a child's illness) and adversity you create (meth, burglaries, lies). He had spent years believing he could keep control of his addiction and dodge accountability. The truth caught him.", "value": "Radical accountability", "valueDesc": "Owning your part — no more, no less — is where freedom starts.", "ex": {"note": "List 10 hard things from the last year. Sort each into the right column. Watch what happens to shame when they're separated.", "blocks": [{"k": "rows", "n": 10, "cols": [{"l": "The hard thing"}, {"l": "Whose?", "t": "sel", "o": ["Mine to own", "Not mine to own"]}]}]}, "bookPage": 51, "fac": {"why": "The chapter's central tension — there is adversity that is created for you, and adversity you create. both require response; only one requires amends — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 3: Two Kinds of Adversity in Life (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 3: Two Kinds of Adversity in Life of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: May 18, 2009. Dallas County sentences Damon to 65 years in prison — 'six dimes and a nickel.' The judge who imposes the sentence is a man Damon had known socially in his pre-addiction life. Damon makes no excuses. He distinguishes between adversity life hands you (cancer, job loss, a child's illness) and adversity you create (meth, burglaries, lies). He had spent years believing he could keep control of his addiction and dodge accountability. The truth caught him.\"", "Read the chapter's anchor quote: \"Living in reality is always better than living in a lie.\" (Damon West, Ch. 3)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"On a scale of 1-10, how honest have you been with yourself this week about your part in what brought you here?\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Accountability Column Exercise", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Chapter 3: Two Kinds of Adversity in Life gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Draw two columns labeled 'Mine to Own' and 'Not Mine to Own.' List 10 hard things from the last year. Sort them. Notice what happens to shame when the lists are separated.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What adversity in your life was created for you — by others, by circumstance, by illness?", "• What adversity did you create with your own choices?", "• Where is the line between accountability and shame for you? How do you stay on the accountability side?", "• What lie did you believe about your using that eventually fell apart?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 3: Two Kinds of Adversity in Life is worth carrying out the door: \"Living in reality is always better than living in a lie.\" (Damon West, Ch. 3). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Clien bt": "Right-Size Reality Check: List 5 recent thoughts you've had about yourself. Sort them into 'inflated,' 'deflated,' or 'right-sized.' For each inflated or deflated thought, write a right-sized replacement statement.", "step": "Steps 11 and 12 are explicit about service as the foundation of ongoing recovery.", "safety": "Caution: some guests over-function as caretakers to manage anxiety. Service should not become a re-enactment of codependency. Discuss motivation, not just behavior.", "practice": "Identify one peer in house this week and do one small service for them (make them coffee, hold a door, listen).", "quote": "Humility is becoming right-sized.", "attrib": "'Ray' via Damon West, Ch. 4", "story": "Damon's sponsor Ray calls him — on the road, overbooked, tired — and tells him to come speak at Unity House, a residential rehab in Beaumont. Damon pleads his schedule. Ray asks if, during his addiction, he was ever 'too busy' to meet the dealer. Damon goes to Unity House. Ray's lesson: humility is becoming right-sized, and only right-sized people are useful to themselves or others.", "value": "Servant leadership", "valueDesc": "A right-sized self makes room to be useful to someone else.", "ex": {"note": "Five recent thoughts about yourself. Sort each, then right-size the ones that need it.", "blocks": [{"k": "rows", "n": 5, "cols": [{"l": "The thought"}, {"l": "Size", "t": "sel", "o": ["Inflated", "Deflated", "Right-sized"]}, {"l": "Right-sized replacement"}]}]}, "bookPage": 60, "fac": {"why": "The chapter's central tension — humility is being right-sized: not grandiose, not self-loathing — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 4: Servant Leadership (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle.  \"Don't give up before the miracle happens.\" (Damon West, Ch. 6). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Trauma survivors often have a compressed sense of 'enough' — rapid healing expectations can be traumatic in themselves. Slow the pace explicitly.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 6: No Such Thing as an Overnight Success of Damon West's Six Dimes and a Nickel. Theme: No Such Thing as an Overnight Success. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Pace Check) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 5 (Relapse Potential); Dimension 4 (Readiness). / Document the cognitive distortion addressed (minimization, all-or-nothing, impatience) and the reframe practiced.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 6: No Such Thing as an Overnight Success's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 9, "chapter": "Chapter 7: Anyone Can Be a Messenger", "title": "Anyone Can Be a Messenger", "checkin": "Who is one person in your life you rolled your eyes at — and later realized was right about something?", "discussion": ["What is the most important thing you've learned from someone you didn't respect at the time?", "Where are you being closed-minded in treatment right now?", "What is the cost of contempt in your relationships?", "Who in this room have you written off too fast?", "What is one message from your past — from a teacher, coach, or family member — you weren't ready to hear then?"], "cbt": "Belief Flip: Write down 3 beliefs you hold strongly about recovery ('meetings are boring,' 'sponsors are cult-like,' 'medication is weak,' etc.). For each, argue the opposite case as convincingly as you can. Notice what shifts.", "step": "'Contempt prior to investigation' is quoted in the Big Book (attributed to Herbert Spencer) — a direct 12-step bridge.", "safety": "Open-mindedness does not mean re-exposing yourself to unsafe teachers. Distinguish between hearing wisdom from unlikely people and re-engaging with people who have harmed you.", "practice": "Identify one peer in your treatment group you've judged. Ask them one genuine question this week.", "quote": "The mind is like a parachute. It only works when it's open.", "attrib": "'Ray' via Damon West, Ch. 7", "story": "The Mark Stiles Unit, 'Seven Building' — the life-sentence dorm. Damon's first full year inside maximum security. Under prison rules he cannot hold a job because he is a lifer, and he cannot interact with the general population. The deafening noise inside his own head is more oppressive than the physical prison. He finds purpose by teaching other men to read. He learns that everyone around him is a teacher — some in how to live, some in how not to. Open-mindedness, his sponsor will later tell him, is the antidote to ignorance.", "value": "An open mind", "valueDesc": "Wisdom can come from anyone. Contempt costs you the lesson.", "ex": {"note": "Three strong beliefs about recovery. Argue the opposite case as convincingly as you can.", "blocks": [{"k": "rows", "n": 3, "cols": [{"l": "My belief"}, {"l": "The strongest opposite case I can make"}]}, {"k": "field", "l": "What shifted?"}]}, "bookPage": 89, "fac": {"why": "The chapter's central tension — contempt prior to investigation keeps a person in permanent ignorance — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 7: Anyone Can Be a Messenger (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 7: Anyone Can Be a Messenger of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: The Mark Stiles Unit, 'Seven Building' — the life-sentence dorm. Damon's first full year inside maximum security. Under prison rules he cannot hold a job because he is a lifer, and he cannot interact with the general population. The deafening noise inside his own head is more oppressive than the physical prison. He finds purpose by teaching other men to read. He learns that everyone around him is a teacher — some in how to live, some in how not to. Open-mindedness, his sponsor will later tell him, is the antidote to ignorance.\"", "Read the chapter's anchor quote: \"The mind is like a parachute. It only works when it's open.\" ('Ray' via Damon West, Ch. 7)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"Who is one person in your life you rolled your eyes at — and later realized was right about something?\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Belief Flip", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Chapter 7: Anyone Can Be a Messenger gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Write down 3 beliefs you hold strongly about recovery ('meetings are boring,' 'sponsors are cult-like,' 'medication is weak,' etc.). For each, argue the opposite case as convincingly as you can. Notice what shifts.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What is the most important thing you've learned from someone you didn't respect at the time?", "• Where are you being closed-minded in treatment right now?", "• What is the cost of contempt in your relationships?", "• Who in this room have you written off too fast?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 7: Anyone Can Be a Messenger is worth carrying out the door: \"The mind is like a parachute. It only works when it's open.\" ('Ray' via Damon West, Ch. 7). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Open-mindedness does not mean re-exposing yourself to unsafe teachers. Distinguish between hearing wisdom from unlikely people and re-engaging with people who have harmed you.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 7: Anyone Can Be a Messenger of Damon West's Six Dimes and a Nickel. Theme: Anyone Can Be a Messenger. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Belief Flip) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 3 (Emotional/Behavioral/Cognitive); Dimension 4 (Readiness). / Document cognitive flexibility as an emerging strength — a positive prognostic indicator.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 7: Anyone Can Be a Messenger's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 10, "chapter": "Chapter 8: The Healing Power of Forgiveness", "title": "The Healing Power of Forgiveness", "checkin": "Who is one person you need to forgive — including yourself — and have not?", "discussion": ["Where in your life does making direct amends risk more harm than healing?", "What would a living amends look like for you?", "What is the difference between forgiving yourself and letting yourself off the hook?", "Whose unforgiveness of you is the heaviest to carry? What can you do with that weight?", "How does holding a resentment keep the other person in control of your life?"], "cbt": "Amends Map: Three columns — Name | Direct Amend Possible? (Y/N) | Living Amend That Fits. Complete for 3-5 people.", "step": "Steps 8 and 9 — the amends steps. Sponsor involvement is required before making direct amends; this session does not substitute.", "safety": "Victims of abuse are often pushed into premature forgiveness by well-meaning systems. Make clear: no one in this group is required to forgive anyone. This session is about your freedom, not your harm-doer's relief.", "practice": "Write a letter to one person you've harmed that you will not send. Seal it. Bring it to individual session.", "quote": "Resentment is the thing addicts drink alcoholically on.", "attrib": "Common 12-step paraphrase reinforced in Ch. 8", "story": "Texas law forbids Damon from ever contacting any of his burglary victims — direct apologies, even on social media, could send him back to prison. The law, intended primarily for victims of violent crimes, also takes the burden of forgiveness off the victim. Unable to make traditional amends, Damon learns about 'living amends' — the lifelong daily behavior that becomes the apology. He also confronts the harder work of forgiving himself.", "value": "Forgiveness", "valueDesc": "Resentment keeps them in charge. Forgiveness sets you free.", "ex": {"note": "Your amends map. 3–5 people. Where a direct amend risks more harm than healing, name the living amend instead.", "blocks": [{"k": "rows", "n": 5, "cols": [{"l": "Name or role"}, {"l": "Direct amend possible?", "t": "sel", "o": ["Yes", "No — more harm than healing", "Not yet — ask my sponsor"]}, {"l": "The living amend that fits"}]}]}, "bookPage": 99, "fac": {"why": "The chapter's central tension — living amends: when direct amends would harm the other person, the apology is how you live from now on — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 8: The Healing Power of Forgiveness (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", " xplored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 3 (Emotional/Behavioral); Dimension 5 (Relapse Potential). / Note specific amends plan or living-amends commitment — tie to IRP goal on relational repair.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 8: The Healing Power of Forgiveness's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 11, "chapter": "Chapter 9: Build Your Brand", "title": "Build Your Brand", "checkin": "If a stranger asked your sponsor, your mother, and your boss to describe you in three words, would they give the same three?", "discussion": ["What three words do you want to be known by three years from now?", "What three words are you actually building right now by your behavior?", "Where is the gap between your intended brand and your actual brand?", "Who is the 'right audience' for the person you are becoming?", "Is there a version of you online that contradicts the person you are in here?"], "cbt": "Brand Audit: Draw two columns — 'How I want to be known' and 'Evidence from this week.' Be honest about the gap. Pick one behavior to change.", "step": "Steps 10 and 11 — daily review and prayer/meditation — are the maintenance systems for brand consistency.", "safety": "Some guests have been branded by others (by a charge sheet, a diagnosis, a family label) for decades. This exercise is about reclaiming the authoring of your identity.", "practice": "Post or unpost one thing on social media this week to bring it in line with the person you are becoming.", "quote": "You are a brand.", "attrib": "Damon West, Ch. 9", "story": "2011, inside
