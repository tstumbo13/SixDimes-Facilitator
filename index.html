lk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 9: Build Your Brand of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: 2011, inside a Texas maximum-security prison. A supermax inmate escapes, triggering a month-long lockdown. Damon uses the forced confinement to start journaling, and those journals will eventually become his first book, The Change Agent. He begins to see himself as a brand — not in a marketing sense, but in the sense that every choice, every interaction, is a deposit in or withdrawal from his reputation. He decides the brand he wants to build is: honest, useful, consistent, present.\"", "Read the chapter's anchor quote: \"You are a brand.\" (Damon West, Ch. 9)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"If a stranger asked your sponsor, your mother, and your boss to describe you in three words, would they give the same three?\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Brand Audit", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Chapter 9: Build Your Brand gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Draw two columns — 'How I want to be known' and 'Evidence from this week.' Be honest about the gap. Pick one behavior to change.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What three words do you want to be known by three years from now?", "• What three words are you actually building right now by your behavior?", "• Where is the gap between your intended brand and your actual brand?", "• Who is the 'right audience' for the person you are becoming?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 9: Build Your Brand is worth carrying out the door: \"You are a brand.\" (Damon West, Ch. 9). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Some clients have been branded by others (by a charge sheet, a diagnosis, a family label) for decades. This exercise is about reclaiming the authoring of your identity.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 9: Build Your Brand of Damon West's Six Dimes and a Nickel. Theme: Build Your Brand. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Brand Audit) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 4 (Readiness); Dimension 6 (Recovery Environment). / Document identity-level recovery goals and the client's specific behavioral commitments tied to them.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 9: Build Your Brand's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 12, "chapter": "Chapter 10: You're Most Qualified to Help the Person You Once Were", "title": "You're Most Qualified to Help the Person You Once Were", "checkin": "Name one hard thing from your past that could, one day, help someone else get through theirs.", "discussion": ["Who is the person you once were? Describe them in 3 sentences without judgment.", "If you met that version of you today, what is the one thing you would say?", "What is the difference between a 'helper' and a 'rescuer'? Which are you more likely to become?", "How do you know when you are overdrawn on your own self-care?", "What would it mean to become a peer recovery coach one day?"], "cbt": "Letter to a Former Self: Write a one-page letter to yourself at the age when your using was at its worst. Include: what you now know, what was not your fault, and what you would ask of them.", "step": "Step 12 is this chapter's backbone.", "safety": "Some 'former selves' are traumatized children, not 'bad people.' Approach with the same gentleness you would show any child in pain.", "practice": "Share one piece of your story with a newer peer in house this week — only if you are clinically ready.", "quote": "You're most qualified to help the person you once were.", "attrib": "Ed Mylett via Damon West, Ch. 10", "story": "Damon is inside the Texas Department of Criminal Justice with Dallas Cowboys QB Dak Prescott, speaking to incarcerated men about mental health, suicide, and change. As a former inmate, Damon has a 'currency' with this audience that Dak — loving and committed as he is — cannot have. Ed Mylett has told him: the things you think disqualify you are actually what qualify you most. Damon now builds his whole platform on that insight.", "value": "Your story is a tool", "valueDesc": "You're most qualified to help the person you once were.", "ex": {"note": "Write to yourself at the age when your using was at its worst. Take your time. No one reads this but you.", "blocks": [{"k": "field", "l": "Dear me, at age…"}, {"k": "field", "l": "What I know now", "tall": 1}, {"k": "field", "l": "What was not your fault", "tall": 1}, {"k": "field", "l": "What I'd ask of you", "tall": 1}]}, "bookPage": 129, "fac": {"why": "The chapter's central tension — what disqualifies you is often exactly what qualifies you to help — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 10: You're Most Qualified to Help the Person You Once Were (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 10: You're Most Qualified to Help the Person You Once Were of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: Damon is inside the Texas Department of Criminal Justice with Da What do you tell yourself to avoid the hard thing?", "How is voluntary adversity different from self-punishment? Where's the line?", "What 'writ' are you putting off writing in your own life?"], "cbt": "Exposure Ladder: List 5 avoidance behaviors, rank them 1-10 by how hard they feel, and commit to doing the #3 this week. Not the #1 — that's for later.", "step": "Step 4 is the cornerstone voluntary adversity of recovery: searching and fearless moral inventory, written.", "safety": "For guests with PTSD, voluntary adversity must be titrated carefully — flooding can retraumatize. Favor graded exposure over heroic leaps.", "practice": "Do one thing you're afraid of this week. Write down what you feared, what happened, and what you learned.", "quote": "Do things you're afraid of, so you can do things you're afraid of.", "attrib": "Damon West's father, Ch. 11", "story": "2012. Damon's appeal is denied — his sentence is now effectively permanent. His family has spent $50,000 on his defense; there is no more money. His only remaining legal option is to write his own writ of habeas corpus, by hand, with no legal training, from a maximum-security cell. He writes the writ. His father's old line keeps echoing: Do things you're afraid of, so you can do things you're afraid of.", "value": "Do it afraid", "valueDesc": "Chosen hardship builds the muscle for the hardship you don't choose.", "ex": {"note": "Five things you avoid, ranked by how hard they feel. You're committing to the #3 — not the #1. That one's for later.", "blocks": [{"k": "rows", "n": 5, "cols": [{"l": "What I avoid"}, {"l": "How hard (1–10)", "t": "num"}]}, {"k": "field", "l": "My #3 — what I'll do this week"}]}, "bookPage": 140, "fac": {"why": "The chapter's central tension — facing fears removes their power — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 11: Voluntary Adversity (10–15 minutes). ose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What small voluntary adversity could you choose this week (cold shower, a difficult phone call, speaking up in group, eating alone in public)?", "• Describe a time you did something afraid — and what you gained from it.", "• What do you tell yourself to avoid the hard thing?", "• How is voluntary adversity different from self-punishment? Where's the line?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 11: Voluntary Adversity is worth carrying out the door: \"Do things you're afraid of, so you can do things you're afraid of.\" (Damon West's father, Ch. 11). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "For clients with PTSD, voluntary adversity must be titrated carefully — flooding can retraumatize. Favor graded exposure over heroic leaps.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 11: Voluntary Adversity of Damon West's Six Dimes and a Nickel. Theme: Voluntary Adversity. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Exposure Ladder) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 3 (Emotional/Behavioral); Dimension 4 (Readiness). / Document specific exposure task and client's reported pre/post anxiety rating.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 11: Voluntary Adversity's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 14, "chapter": "Chapter 12: Control the Controllables", "title": "Control the Controllables", "checkin": "Name one thing you are spinning about right now that is completely off your line.", "discussion": ["What is one controllable you have been neglecting (sleep, meds, meetings, water)?", "Where do you confuse influence with control?", "How does discipline create freedom instead of restricting it?", "What is one uncontrollable you are still trying to control — and what is it costing you?", "What is on your line today, right now?"], "cbt": "Control Diagram: Draw two concentric circles. Inner = 'On my line.' Outer = 'Off my line.' Put 10 current stressors in the correct circle. Spend 5 minutes on any action item in the inner circle.", "step": "The Serenity Prayer is this entire chapter in 25 words.", "safety": "Some trauma responses include hyper-vigilance — trying to control uncontrollable things is often a protective strategy. Approach with compassion, not correction.", "practice": "Each morning this week, write one sentence: 'Today, the main thing on my line is ___.'", "quote": "Discipline is on your line.", "attrib": "Damon West, Ch. 12", "story": "Damon sits across from his parole officer, Ms. Braggs, for a monthly meeting. He's made roughly 400 travel permit requests since release — 'one of the highest profile parolees in Texas.' Braggs reminds him: you cannot stub your toe. Damon explains the discipline: he focuses on what's on his 'line' (what he can actually influence) and refuses to pour time into what isn't. Discipline becomes freedom.", "value": "Control the controllables", "valueDesc": "Discipline on your line creates freedom everywhere else.", "ex": {"note": "Ten current stressors. Inner circle = on my line (I control it). Outer = off my line.", "blocks": [{"k": "rows", "n": 10, "cols": [{"l": "Stressor"}, {"l": "Circle", "t": "sel", "o": ["On my line — I control this", "Off my line — I don't"]}]}, {"k": "field", "l": "One action on something inside my line — right now"}]}, "bookPage": 148, "fac": {"why": "The chapter's central tension — what is on your line: your thinking, your actions, your words, your consistency — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 12: Control the Controllables (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Chapter 12: Control the Controllables of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: Damon sits across from his parole officer, Ms. Braggs, for a monthly meeting. He's made roughly 400 travel permit requests since release — 'one of the highest profile parolees in Texas.' Braggs reminds him: you cannot stub your toe. Damon explains the discipline: he focuses on what's on his 'line' (what he can actually influence) and refuses to pour time into what isn't. Discipline becomes freedom.\"", "Read the chapter's anchor quote: \"Discipline is on your line.\" (Damon West, Ch. 12)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"Name one thing you are spinning about right now that is completely off your line.\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Control Diagram", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Chapter 12: Control the Controllables gives us something concrete to work with ng round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Chapter 12: Control the Controllables is worth carrying out the door: \"Discipline is on your line.\" (Damon West, Ch. 12). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Some trauma responses include hyper-vigilance — trying to control uncontrollable things is often a protective strategy. Approach with compassion, not correction.", "docPrompt": "Intervention: 90-minute open process group anchored on Chapter 12: Control the Controllables of Damon West's Six Dimes and a Nickel. Theme: Control the Controllables. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Control Diagram) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 3 (Emotional/Behavioral); Dimension 5 (Relapse Potential). / Document client's emerging capacity to distinguish controllables — a key emotion-regulation skill.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 12: Control the Controllables's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 15, "chapter": "Chapter 13: Stay in Your Lane", "title hat does imposter syndrome sound like in your head?", "What would you remember if you couldn't remember any of your failures?", "How often do you say 'try' this week? What would 'do' sound like?", "Who in your life reminds you of your successes when you forget?", "What is one expectation you need to manage down, and one you need to manage up?"], "cbt": "Success File: Write down 10 things you have succeeded at in your life. Not what others told you to list — what you know. Carry the list with you.", "step": "The 'Keep it simple' tradition is about scaling goals to achievable daily actions — remembering you stayed sober today is a success worth counting.", "safety": "For guests raised with contingent love or abuse, claiming success can feel dangerous — like inviting the other shoe. Name this. It is not the same as grandiosity.", "practice": "Read your success file every night this week before bed.", "quote": "Try is a powerless word.", "attrib": "Randy Glenn via Damon West, Ch. 16", "story": "Damon's friend Randy Glenn challenges him on the word 'try' — it's a powerless word, an excuse, a way out. Damon is stuck writing this book, overwhelmed, staring at a blank page. Randy tells him to say no to what's not the goal. Damon realizes imposter syndrome has been his old companion all along, and the antidote is remembering past wins. Confidence, he learns, is not a feeling — it's evidence.", "value": "Remember your wins", "valueDesc": "You've succeeded before. Imposter syndrome is a liar.", "ex": {"note": "Ten things you have genuinely succeeded at. Not what others told you to list — what you know.", "blocks": [{"k": "list", "n": 10, "l": "I succeeded at"}]}, "bookPage": 194, "fac": {"why": "The chapter's central tension — remembering past success silences imposter thoughts — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 16: Remember When You Succeeded (10– r the week. Track it daily.", "quote": "Keeping the promises to yourself builds confidence.", "attrib": "Damon West, Ch. 19", "story": "The Kyle Unit, Damon's final prison — minimum security, six months from release. He calls it the 'two-minute drill.' No longer trying to come from behind; just trying to hold the ball. Many men self-destruct in the final stretch. Damon commits to the opposite: reclaim his body. Running, strength work, eating within calorie math, detoxing from prison thinking. A healthy body becomes his anchor for a healthy mind.", "value": "Keep promises to yourself", "valueDesc": "Self-care isn't soft. It's how confidence gets rebuilt.", "ex": {"note": "The four-legged stool your recovery sits on.", "blocks": [{"k": "rows", "n": 4, "cols": [{"l": "Leg", "t": "fixed", "o": ["Sleep", "Nutrition", "Movement", "Medical / dental care"]}, {"l": "Rating (1–10)", "t": "num"}]}, {"k": "field", "l": "My weakest leg — and my 3-week goal"}]}, "bookPage": 227, "fac": {"why": "The chapter's central tension — healthy body, healthy mind — the link is biological, not metaphorical — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Chapter 19: Finish Strong and Get Physical (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in th -Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Chapter 21: Use Your Platform for Good's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 24, "chapter": "Epilogue: Turn Darkness into Light", "title": "Turn Darkness Into Light", "checkin": "If someone who met you on Day 1 of treatment met you today, what would they notice is different?", "discussion": ["What 'prison' were you in before treatment that had no walls?", "Whose darkness have you turned into light this year?", "Who in your life is still in a dark place you could walk toward?", "What does discharge mean to you — end or beginning?", "What will you take from this curriculum with you for the next 10 years?"], "cbt": "One-Page Recovery Manifesto: On one page, write your personal statement: who I am, what I believe, who I serve, and what I will and will not do. Share a line with the group.", "step": "The 12th Step in practice: a discharge day is a commencement of service.", "safety": "Discharge is a transition, and transitions can destabilize trauma survivors. Build in scheduled check-ins post-discharge if clinically appropriate.", "practice": "Complete your relapse-prevention plan and share it with a sponsor, family member, and therapist.", "quote": "It's a life lesson, not a life sentence.", "attrib": "Damon West, Epilogue", "story": "December 23, 2024. Damon walks his widowed mother into a new home he and Kendell built for her on their property. She had been alone since his father died; before that, she was the one who made 150 trips to Stiles visitation, half on bad knees. He remembers that she is the person who turned darkness into light for him first. Now he returns the gift. The Epilogue reminds us: a physical prison is rarely the worst one. The mental, emotional, and spiritual prisons are more common, and the work is lifelong.", "value": "Turn darkness into light", "valueDesc": "It's a life lesson, not a life sentence.", "ex": {"note": "Your one-page recovery manifesto.", "blocks": [{"k": "field", "l": "Who I am", "tall": 1}, {"k": "field", "l": "What I believe", "tall": 1}, {"k": "field", "l": "Who I serve", "tall": 1}, {"k": "field", "l": "What I will do — and what I will not do", "tall": 1}]}, "bookPage": 252, "fac": {"why": "The chapter's central tension — the worst prisons are rarely physical — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Epilogue: Turn Darkness into Light (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Epilogue: Turn Darkness into Light of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: December 23, 2024. Damon walks his widowed mother into a new home he and Kendell built for her on their property. She had been alone since his father died; before that, she was the one who made 150 trips to Stiles visitation, half on bad knees. He remembers that she is the person who turned darkness into light for him first. Now he returns the gift. The Epilogue reminds us: a physical prison is rarely the worst one. The mental, emotional, and spiritual prisons are more common, and the work is lifelong.\"", "Read the chapter's anchor quote: \"It's a life lesson, not a life sentence.\" (Damon West, Epilogue)."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"If someone who met you on Day 1 of treatment met you today, what would they notice is different?\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — One-Page Recovery Manifesto", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Epilogue: Turn Darkness into Light gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "On one page, write your personal statement: who I am, what I believe, who I serve, and what I will and will not do. Share a line with the group.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• What 'prison' were you in before treatment that had no walls?", "• Whose darkness have you turned into light this year?", "• Who in your life is still in a dark place you could walk toward?", "• What does discharge mean to you — end or beginning?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Epilogue: Turn Darkness into Light is worth carrying out the door: \"It's a life lesson, not a life sentence.\" (Damon West, Epilogue). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "Discharge is a transition, and transitions can destabilize trauma survivors. Build in scheduled check-ins post-discharge if clinically appropriate.", "docPrompt": "Intervention: 90-minute open process group anchored on Epilogue: Turn Darkness into Light of Damon West's Six Dimes and a Nickel. Theme: Turn Darkness Into Light. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (One-Page Recovery Manifesto) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: All dimensions — discharge/transition focused. / Finalize discharge summary: progress toward IRP goals, relapse-prevention plan, continuing-care referrals (outpatient, MAT coordination, recovery housing, peer support).", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Epilogue: Turn Darkness into Light's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}, {"num": 25, "chapter": "Bonus Chapter: JT's Story", "title": "JT's Story — The Company We Keep", "checkin": "Who is waiting for you at home — and which ones worry you most?", "discussion": ["Who has been a 'JT' in your life — fascinating, kind to you, and net-negative for your recovery?", "What stories do you keep telling about old life that make it sound better than it was?", "How do you honor relationships from the past while protecting your recovery?", "What is one conversation you need to have with an old friend before discharge?", "If your discharge plan had to survive contact with one difficult person, who would it be?"], "cbt": "Boundary Script: Pick one person your recovery needs distance from. Write a short, specific, kind script for the boundary. Role-play with a peer.", "step": "'We cannot live with anger' — the 12-step warning about resentments applies equally to sentimentality about harmful people.", "safety": "This session can surface grief about lost friendships. Make space for the loss without romanticizing the harm.", "practice": "Finalize your post-discharge contact list — who you'll call, who you won't.", "quote": "Guys like us gotta stick together.", "attrib": "JT via Damon West, Bonus Chapter (handle with discernment)", "story": "Damon shares fragments from JT, an older inmate who claimed proximity to Dallas mob history — including Jack Ruby's killing of Lee Harvey Oswald. JT was charming, dangerous, and became a fatherly figure inside. He told Damon: guys like us gotta stick together. The stories are uncheckable and likely half-apocryphal. But the lesson Damon keeps from JT isn't the JFK rumor — it's how, even in the worst places, the people we keep company with carve us.", "value": "Protect your recovery", "valueDesc": "Honor the past without handing it your future.", "ex": {"note": "One person your recovery needs distance from. Short, specific, kind.", "blocks": [{"k": "field", "l": "The person (role or initials)"}, {"k": "field", "l": "My boundary script — what I'll actually say", "tall": 1}, {"k": "field", "l": "When and how I'll deliver it"}]}, "bookPage": 259, "fac": {"why": "The chapter's central tension — even charismatic figures from your past can be slow poison — is highly process-amenable. The anchor question generates material members carry into the room without needing extensive teaching first.", "before": ["Read Bonus Chapter: JT's Story (10–15 minutes). The frame, anchor prompt, CBT exercise, and closing quote in this guide are all taken from the chapter — you'll want them fresh in your head.", "Set up the room in a circle. No tables between members.", "Bring: blank paper or notebooks for the CBT exercise, a printed copy of the closing prompt, tissues, water, a visible clock.", "Check the day's milieu before group: any disruption, intake, or discharge in the room? Note it so you can hold it gently if it surfaces."], "arc": [{"min": 5, "name": "Settling — land in the room", "steps": ["Brief grounding: invite members to put both feet on the floor, take three slow breaths, and notice one thing they can see, hear, and feel in this room.", "Re-read the confidentiality reminder once aloud."]}, {"min": 15, "name": "Check-in round (one pass, no cross-talk)", "steps": ["Prompt:", "\"One feeling word for how you walked in today — plus a number from 1 to 10 for how present you are right now.\"", "Reflect each one in two or three words and move on.", "Notice: anyone scoring 1–3 may need an in-group check later. Anyone scoring 10 may be performing — also worth noticing."]}, {"min": 5, "name": "Frame the chapter (in your own words)", "steps": ["Read this aloud, paraphrasing in your own words:", "\"In Bonus Chapter: JT's Story of Damon West's book, here is the scene Damon sets — paraphrase it in your own words, not as a recitation: Damon shares fragments from JT, an older inmate who claimed proximity to Dallas mob history — including Jack Ruby's killing of Lee Harvey Oswald. JT was charming, dangerous, and became a fatherly figure inside. He told Damon: guys like us gotta stick together. The stories are uncheckable and likely half-apocryphal. But the lesson Damon keeps from JT isn't the JFK rumor — it's how, even in the worst places, the people we keep company with carve us.\"", "Read the chapter's anchor quote: \"Guys like us gotta stick together.\" (JT via Damon West, Bonus Chapter (handle with discernment))."]}, {"min": 12, "name": "Anchor prompt + opening responses", "steps": ["Anchor prompt (read aloud):", "\"Who is waiting for you at home — and which ones worry you most?\"", "Go around the circle once. Each member gets up to 60 seconds. Still no cross-talk yet.", "Reflect each share in one sentence using the member's own words. Do not interpret.", "Coaching note:", "Many members will give a 'safe' or rehearsed answer first. The richer material is one layer down — what they didn't want to say first. If the room stays shallow, drop the follow-up below.", "Follow-up if the room is shallow:", "\"Now answer the question again — but this time, name the part you didn't want to say first.\""]}, {"min": 18, "name": "CBT Exercise — Boundary Script", "steps": ["Transition aloud:", "\"Now we're going to put it on paper for a few minutes. Bonus Chapter: JT's Story gives us something concrete to work with — let's name it on paper before we work it together as a room.\"", "The exercise:", "Pick one person your recovery needs distance from. Write a short, specific, kind script for the boundary. Role-play with a peer.", "Eight minutes of quiet writing. Members work alone. Facilitator stays seated, available but not interrupting.", "Then pair up (or triad if odd numbers). Each pair has six minutes — three minutes per person. Each member shares ONE row or one specific piece of their work. The listener's only job is to reflect back what they heard — not to fix, advise, or compare.", "Pull the group back together for the open-process block. The pair work primes the room — members will return having heard at least one truth said out loud.", "Trauma note:", "If a member appears flooded during the writing block, quietly check in. They can sit with the prompt without writing — silence on the page is allowed."]}, {"min": 20, "name": "Open process", "steps": ["Cross-talk opens. Your job shifts from check-in keeper to process facilitator. Open with:", "\"What happened in pairs that you want to bring to the room?\"", "Watch for:", "• Members whose answer is rehearsed (they've said it before in meetings). Name it: \"That sounded like a sentence you've said before. What does it sound like in your own voice today?\"", "• Patterns across multiple members' shares. Name the pattern once and ask the group what it's about.", "• Anyone moving into rumination or trauma-detail. Slow them down: \"Stay with the feeling, not the story.\"", "Process prompts to deploy when the room stalls (use one at a time, hold the silence):", "• Who has been a 'JT' in your life — fascinating, kind to you, and net-negative for your recovery?", "• What stories do you keep telling about old life that make it sound better than it was?", "• How do you honor relationships from the past while protecting your recovery?", "• What is one conversation you need to have with an old friend before discharge?"]}, {"min": 10, "name": "Closing round", "steps": ["Prompt:", "\"One sentence: the one piece of this chapter I'll carry out the door — what I'll do, who I'll tell, or how I'll change.\"", "Go around the full circle. Do not skip anyone. If a member tries to pass, hold the space: \"Take your time — we'll come back to you.\""]}, {"min": 5, "name": "Close & ground", "steps": ["Read the closing aloud:", "\"Damon's line from Bonus Chapter: JT's Story is worth carrying out the door: \"Guys like us gotta stick together.\" (JT via Damon West, Bonus Chapter (handle with discernment)). What was said in here stays in here. Take care of what came up.\"", "Three breaths together. Door opens."]}], "containment": "This session can surface grief about lost friendships. Make space for the loss without romanticizing the harm.", "docPrompt": "Intervention: 90-minute open process group anchored on Bonus Chapter: JT's Story of Damon West's Six Dimes and a Nickel. Theme: JT's Story — The Company We Keep. Structure: facilitator-led check-in, chapter framing, anchor prompt, CBT exercise (Boundary Script) with pair share, open process, closing round. / Client response (individual): [client] [described / explored / disclosed / avoided] [briefly: theme of their share, observable affect, level of engagement, any interpersonal moments]. [Note participation level, any change-talk, and any safety-relevant content.] / ASAM dimensions addressed: Dimension 6 (Recovery Environment); Dimension 5 (Relapse Potential). / Document high-risk post-discharge contacts and specific avoidance/boundary strategies in the relapse-prevention plan.", "selfCheck": ["— Facilitator Self-Check", "Did anyone in the room not get a piece of you today? (Note for next group.)", "Bonus Chapter: JT's Story's anchor question lands differently on the facilitator each time. What was your honest answer today?", "Were there safety concerns? Document and follow up before end of day."]}}], "sixIdeas": [["The Coffee Bean", "Placed in boiling water, the carrot goes soft, the egg goes hard — but the coffee bean changes the water. You're called to transform your environment rather than be hardened or softened by it."], ["The Next Right Thing", "One pro-social, pro-recovery choice after another. The compounding interest of small choices produces transformation."], ["Opportunity in Adversity", "Every hardship — divorce, job loss, grief, relapse, incarceration — contains an opportunity to become a better version of yourself."], ["Right-Sized", "Humility is neither inflated (grandiosity) nor deflated (shame). A right-sized self-view is the prerequisite for service."], ["Be Where Your Feet Are", "Present-moment focus — both a mindfulness practice and an antidote to rumination, fantasy, and craving."], ["Living Amends", "When direct amends would cause more harm than healing, ongoing changed behavior becomes the amends."]], "coins": [{"at": 4, "type": "dime", "name": "The Next Right Thing"}, {"at": 8, "type": "dime", "name": "The Coffee Bean"}, {"at": 12, "type": "dime", "name": "Living Amends"}, {"at": 16, "type": "dime", "name": "Opportunity in Adversity"}, {"at": 20, "type": "dime", "name": "Be Where Your Feet Are"}, {"at": 24, "type": "dime", "name": "Right-Sized"}, {"at": 25, "type": "nickel", "name": "Carry It Forward"}], "baseline": [["Why I'm here", "What brought me into treatment — or to this app — this time?"], ["My story, the short version", "When did it start, what did it do for me, and what has it cost?"], ["What I'm afraid of", "One fear about recovery, and one fear about life without using."], ["What I want on the other side", "A year from today, what does your life look like if this works?"]], "plan": [["My five biggest lessons from this book", 1], ["My people — who's in my circle now, and how to reach them", 1], ["My meetings — where I show up, at what times", 1], ["My warning signs — what I know to watch for", 1], ["My emergency plan — who I call first, second, third, and what I do with the next hour", 1], ["My living amends — the behavior change I carry forward", 1], ["My answer to the Preface question, now: if someone took over my life tomorrow, the first thing they'd change is…", 1]], "days28": {"1": 3, "2": 4, "3": 5, "4": 6, "5": 7, "6": 8, "7": 10, "8": 11, "9": 12, "10": 13, "11": 14, "12": 15, "13": 17, "14": 18, "15": 19, "16": 20, "17": 21, "18": 22, "19": 24, "20": 25, "21": 26, "22": 27, "23": 28, "24": 28, "25": 28}, "facConf": "\"Before we begin: what is said in this room stays in this room. The fact that you are here today, what you said, and even who else is here — all of it is protected by federal law (42 CFR Part 2). That protection applies to your roommate, your friends' parents, your boss, and anyone else outside this room. We protect each other by keeping what's said here, in here.\"", "facUniv": [["If someone discloses fresh trauma or active crisis in group", "Pause the process. Thank them. Briefly normalize: \"That took courage. I want to make sure we hold this well.\" Move them to the front of your post-group individual list. If active suicidality emerges, follow your agency's safety protocol immediately — do not finish group first."], ["If a member dominates", "After their second extended turn, name it kindly: \"___, I appreciate how much you're putting in today. I want to make sure ___ and ___ get space too.\" Then pivot. If they push back, redirect again — do not enter conflict in group."], ["If the room goes silent for more than 20 seconds", "Trust it. Silence in process group is usually pre-truth, not stuckness. If it lasts past 45 seconds, drop in one process prompt — gently, not as rescue."], ["If a member dissociates or shuts down", "Quietly anchor: \"___, take a breath with me. Feet on the floor. Eyes can stay open or closed.\" Do not call attention from the group. Check on them in the closing round and again after."]]};

<script>
"use strict";
const $=s=>document.querySelector(s);
const APP=$("#app"), NAV=$("#nav");
const KEY="sdan.v1";
let ST=load();
function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.v===1)return s}catch(e){}
  return {v:1,name:"",track:"",started:"",done:{},work:{},journal:[],baseline:{},plan:{},coinSeen:{}};}
function save(){localStorage.setItem(KEY,JSON.stringify(ST));}
const C=window.CURRICULUM, SS=C.sessions;
function esc(t){return (t||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function doneCount(){return Object.keys(ST.done).length;}
function nextSession(){for(const s of SS){if(!ST.done[s.num])return s.num;}return null;}
function coinsEarned(){return C.coins.filter(c=>doneCount()>=c.at);}
function trackLabel(n){
  if(ST.track==="28day"){const d=C.days28[n];return "Day "+(d<10?"0":"")+d;}
  if(ST.track==="24wk")return "Week "+n;
  return "Session "+n;}
function wk(id){return ST.work[id]||"";}
function bindAuto(){
  APP.querySelectorAll("[data-w]").forEach(el=>{
    el.value=wk(el.dataset.w);
    el.addEventListener("input",()=>{ST.work[el.dataset.w]=el.value;clearTimeout(el._t);el._t=setTimeout(save,400);});
  });}
let VIEW="home", SESSION=null;
function go(v,arg){VIEW=v;SESSION=arg||null;render();window.scrollTo(0,0);}
NAV.addEventListener("click",e=>{const b=e.target.closest("button");if(b)go(b.dataset.v);});
function render(){
  if(!ST.track){NAV.classList.add("hidden");renderOnboard();return;}
  NAV.classList.remove("hidden");
  NAV.querySelectorAll("button").forEach(b=>b.classList.toggle("on",b.dataset.v===VIEW||(VIEW==="session"&&b.dataset.v==="home")));
  if(VIEW==="home")renderHome();
  else if(VIEW==="session")renderSession(SESSION);
  else if(VIEW==="book")renderBook();
  else if(VIEW==="journal")renderJournal();
  else if(VIEW==="mywork")renderMyWork();
  else if(VIEW==="support")renderSupport();
  else if(VIEW==="plan")renderPlan();
  else if(VIEW==="ideas")renderIdeas();
  else if(VIEW==="settings")renderSettings();
}
/* ---------- onboarding ---------- */
let OB=0, OBTRACK="";
function renderOnboard(){
  if(OB===0){APP.innerHTML=`<div class="wrap" style="padding-top:9vh;text-align:center">
    <div class="coinrail">${'<div class="coin earned">10¢</div>'.repeat(6)}<div class="coin nickel earned">5¢</div></div>
    <h1 style="margin-top:18px">Six Dimes and a Nickel</h1>
    <p class="muted">A recovery companion, one chapter at a time.</p>
    <div class="card" style="text-align:left;margin-top:24px"><p style="font-size:.95rem">Built on <i>Six Dimes and a Nickel: Life Lessons to Empower Change</i> by Damon West (Post Hill Press, 2025) — 25 sessions of story, values, and written work you can do in treatment, in a group, or entirely on your own.</p>
    <p class="muted" style="margin-top:10px">Everything you write stays on this device. No account, no name, nothing sent anywhere.</p></div>
    <button class="btn" onclick="OB=1;renderOnboard()">Begin</button>
    <p class="tiny" style="margin-top:14px">This app is a companion to recovery work — it is not treatment, therapy, or medical advice, and it's not for emergencies. If you're in crisis, call or text 988.</p>
  </div>`;return;}
  if(OB===1){APP.innerHTML=`<div class="wrap" style="padding-top:5vh">
    <h1>How do you want to walk it?</h1>
    <p class="muted">Same 25 sessions. Pick the pace that matches where you are — you can change this later.</p>
    <button class="trackopt ${OBTRACK==='own'?'on':''}" onclick="OBTRACK='own';renderOnboard()"><b>At my own pace</b><span>No schedule. Work a session whenever you're ready.</span></button>
    <button class="trackopt ${OBTRACK==='24wk'?'on':''}" onclick="OBTRACK='24wk';renderOnboard()"><b>Weekly — the 24-week path</b><span>One session a week, the outpatient rhythm (PHP/IOP).</span></button>
    <button class="trackopt ${OBTRACK==='28day'?'on':''}" onclick="OBTRACK='28day';renderOnboard()"><b>Daily — the 28-day path</b><span>One session most days, the residential rhythm.</span></button>
    <button class="btn" style="margin-top:14px" ${OBTRACK?"":"disabled style='opacity:.5'"} onclick="if(OBTRACK){OB=2;renderOnboard()}">Continue</button>

let BOOK={page:1,from:"home",fromArg:0,doc:null};
function openBook(p,from,fromArg){BOOK.page=p;BOOK.from=from;BOOK.fromArg=fromArg;go("book");}
function bookBack(){go(BOOK.from||"home",(BOOK.from==="session"||BOOK.from==="facsession")?BOOK.fromArg:null);}
function bookNav(d){if(!BOOK.doc)return;const t=BOOK.page+d;if(t<1||t>BOOK.doc.numPages)return;BOOK.page=t;bookRender();}
function bookLib(){
  return new Promise((res,rej)=>{
    if(window.pdfjsLib)return res();
    const sc=document.createElement("script");
    sc.src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js";
    sc.onload=()=>{window.pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";res();};
    sc.onerror=rej;
    document.head.appendChild(sc);
  });
}
function renderBook(){
  APP.innerHTML=`<div class="topbar"><button class="back" onclick="bookBack()">‹ Back</button><h2>Six Dimes and a Nickel — the book</h2></div>
  <div class="wrap" style="max-width:680px">
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:10px">
      <button class="btn sec small" onclick="bookNav(-1)">‹ Prev</button>
      <span class="tiny" id="bkpage" style="min-width:110px;text-align:center">Page ${BOOK.page}</span>
      <button class="btn sec small" onclick="bookNav(1)">Next ›</button>
    </div>
    <div id="bkhold" style="text-align:center"><p class="muted" id="bkmsg">Loading the book…</p><canvas id="bkcanvas" style="max-width:100%;border:1px solid var(--line);border-radius:8px"></canvas></div>
    <div style="display:flex;align-items:center;gap:10px;justify-content:center;margin-top:10px">
      <button class="btn sec small" onclick="bookNav(-1)">‹ Prev</button>
      <button class="btn sec small" onclick="bookNav(1)">Next ›</button>
    </div>
  </div>`;
  bookRender();
}
function bookRender(){
  const msg=document.getElementById("bkmsg"),cv=document.getElementById("bkcanvas");
  const setLbl=()=>{const pl=document.getElementById("bkpage");if(pl)pl.textContent="Page "+BOOK.page+(BOOK.doc?" of "+BOOK.doc.numPages:"");};
  setLbl();
  bookLib()
  .then(()=>BOOK.doc?BOOK.doc:pdfjsLib.getDocument("book.pdf").promise.then(d=>{BOOK.doc=d;return d;}))
  .then(doc=>{
    if(VIEW!=="book")return;
    setLbl();
    return doc.getPage(Math.min(BOOK.page,doc.numPages)).then(page=>{
      if(VIEW!=="book")return;
      const hold=document.getElementById("bkhold");
      const w=Math.min((hold?hold.clientWidth:360)||360,680);
      const dpr=window.devicePixelRatio||1;
      const vp1=page.getViewport({scale:1});
      const vp=page.getViewport({scale:(w-2)/vp1.width*dpr});
      cv.width=vp.width;cv.height=vp.height;cv.style.width=(vp.width/dpr)+"px";
      if(msg)msg.style.display="none";
      return page.render({canvasContext:cv.getContext("2d"),viewport:vp}).promise;
    });
  })
  .catch(()=>{if(msg){msg.style.display="block";msg.innerHTML='Couldn&#39;t load the reader here. <a href="book.pdf" target="_blank" rel="noopener">Open the PDF directly</a> instead.';}});
}
/* ---------- boot ---------- */
render();

.phase .phmin{background:var(--teal); color:#fff; border-radius:8px; font-size:.72rem; font-weight:700; padding:3px 8px; white-space:nowrap}
.phase .phname{font-weight:700; font-size:.95rem; flex:1}
.readaloud{border-left:3px solid var(--teal-mid); background:var(--teal-soft); border-radius:0 8px 8px 0; padding:8px 10px; margin:8px 0; font-style:italic; font-size:.92rem}
.stepp{font-size:.9rem; color:var(--sub); margin:7px 0}
.runbar{position:sticky; top:52px; z-index:15; background:var(--card); border:1px solid var(--line); border-radius:12px; padding:10px 14px; display:flex; align-items:center; gap:12px; margin:10px 0}
.runbar .clock{font-variant-numeric:tabular-nums; font-weight:800; font-size:1.3rem}
.runbar .over{color:var(--coral)}
.pininp{font-size:1.6rem; letter-spacing:.5em; text-align:center; font-variant-numeric:tabular-nums}
.facrow{display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--line); padding:11px 2px; cursor:pointer}
.facrow:last-child{border:none}
.facrow .num{width:30px;height:30px;border-radius:50%;background:var(--teal-soft);color:var(--teal);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0}
.facrow .t{flex:1}
.facrow .t b{display:block;font-size:.93rem}
.facrow .t span{font-size:.76rem;color:var(--faint)}
.checkitem{display:flex;gap:9px;align-items:flex-start;margin:8px 0;font-size:.9rem;color:var(--sub)}
.checkitem input{width:auto;margin-top:3px}
details.fold{border:1px solid var(--line);border-radius:10px;padding:10px 14px;margin-top:10px;background:var(--card)}
details.fold summary{font-weight:600;font-size:.9rem;cursor:pointer;color:var(--teal)}
</style>
<script>
"use strict";
ST.role="fac";
if(ST.pin===undefined)ST.pin="";
let FACOK=false;
let RUN={n:0,phase:-1,t0:0,p0:0,iv:0};
const baseRender=render;
render=function(){
  if(ST.role==="fac"){
    NAV.classList.add("hidden");
    if(!FACOK){renderFacPin();return;}
    if(VIEW==="facsession"){renderFacSession(SESSION);return;}
    if(VIEW==="book"){renderBook();return;}
    if(VIEW==="support"){baseRender();const w=APP.querySelector(".wrap");if(w)w.insertAdjacentHTML("afterbegin",`<button class="back" style="background:none;border:none;color:var(--teal);font-weight:600;font-size:1rem;cursor:pointer;padding:0 0 8px">‹ Back to sessions</button>`),w.querySelector(".back").onclick=()=>go("fachome");return;}
    renderFacHome();return;
  }
  baseRender();
};
function renderFacPin(){
  const create=!ST.pin;
  APP.innerHTML=`<div class="wrap" style="padding-top:9vh;max-width:420px">
    <h1 style="text-align:center">Facilitator access</h1>
    <p class="muted" style="text-align:center">${create?"First time here — set a 4-digit PIN for this facility's devices.":"Enter your facility PIN."}</p>
    <div class="card" style="margin-top:18px">
      <label class="f">${create?"Choose a 4-digit PIN":"PIN"}<input type="text" inputmode="numeric" maxlength="4" class="pininp" id="pin1"></label>
      ${create?`<label class="f">Confirm it<input type="text" inputmode="numeric" maxlength="4" class="pininp" id="pin2"></label>`:""}
      <p class="tiny" id="pinmsg" style="min-height:1em"></p>
      <button class="btn" style="margin-top:12px" onclick="facPinGo(${create})">${create?"Set PIN and enter":"Enter"}</button>
    </div>
    
    <p class="tiny" style="text-align:center;margin-top:14px">The PIN is a doorway, not a vault — it keeps guests in the guest experience. It's stored only on this device.</p>
  </div>`;
}
function facPinGo(create){
  const p1=(document.getElementById("pin1").value||"").trim();
  const msg=document.getElementById("pinmsg");
  if(!/^\d{4}$/.test(p1)){msg.textContent="Four digits, please.";return;}
  if(create){
    const p2=(document.getElementById("pin2").value||"").trim();
    if(p1!==p2){msg.textContent="Those don't match — try again.";return;}
    ST.pin=p1;save();FACOK=true;go("fachome");
  }else{
    if(p1!==ST.pin){msg.textContent="That's not it. Ask your program director for the PIN.";return;}
    FACOK=true;go("fachome");
  }
}
function renderFacHome(){
  APP.innerHTML=`<div class="wrap">
    <p class="tiny" style="text-align:center;margin:2px 0 0">SIX DIMES AND A NICKEL</p>
    <h1 style="text-align:center">Facilitator</h1>
    <p class="muted" style="text-align:center">The universal 90-minute process group, one chapter at a time.</p>
    <details class="fold"><summary>Opening confidentiality script — read at every group</summary>
      <div class="readaloud" style="margin-top:8px">${esc(C.facConf)}</div></details>
    <details class="fold"><summary>Universal containment — the four cases, every group</summary>
      ${C.facUniv.map(u=>`<p class="stepp"><b style="color:var(--ink)">${esc(u[0])}</b><br>${esc(u[1])}</p>`).join("")}</details>
    <div class="card" style="margin-top:14px">
      ${SS.map(s=>`<div class="facrow" onclick="go('facsession',${s.num})"><div class="num">${s.num}</div><div class="t"><b>${esc(s.title)}</b><span>${esc(s.chapter.split(":")[0])} · ${esc(s.value)}</span></div><span style="color:var(--faint)">›</span></div>`).join("")}
    </div>
    <button class="btn sec" onclick="openBook(1,'fachome',0)">Read the book</button>
    <button class="btn sec" style="margin-top:10px" onclick="VIEW='support';render()">Crisis and support resources</button>
    <a class="btn sec" style="display:block;text-align:center;text-decoration:none;margin-top:10px" href="https://tstumbo13.github.io/SixDimes/" target="_blank" rel="noopener">The guest app — share this link with guests</a>
    <p class="tiny" style="text-align:center;margin-top:12px">Session content is drawn verbatim from the Six Dimes and a Nickel Facilitator Guide. Document in KIPU per program policy.</p>
  </div>`;
}
function facStep(t){
  if(t.startsWith('"')||t.startsWith("“"))return `<div class="readaloud">${esc(t)}</div>`;
  if(/^(Prompt|Transition aloud|Anchor prompt|Read this aloud|Open with|Follow-up|Read the closing)/.test(t))return `<p class="stepp" style="font-weight:600;color:var(--ink)">${esc(t)}</p>`;
  return `<p class="stepp">${esc(t)}</p>`;
}
function renderFacSession(n){
  const s=SS[n-1], f=s.fac;
  const phases=f.arc.map((a,i)=>`
    <div class="phase" id="ph${i}">
      <div class="phhead"><span class="phmin">${a.min} MIN</span><span class="phname">${esc(a.name)}</span></div>
      ${a.steps.map(facStep).join("")}
    </div>`).join("");
  APP.innerHTML=`<div class="topbar"><button class="back" onclick="facStop();go('fachome')">‹ Sessions</button><h2>${esc(s.chapter.split(":")[0])} · ${esc(s.title)}</h2></div>
  <div class="wrap">
    <span class="chip">${esc(s.value)}</span>
    <p class="muted" style="margin-top:8px">${esc(f.why)}</p>
    <div class="quote">"${esc(s.quote)}"<span class="who">— ${esc(s.attrib)}</span></div>
    <button class="btn sec" style="margin-top:10px;padding:11px 16px;font-size:.92rem" onclick="facStop();openBook(${s.bookPage},'facsession',${n})">Open ${esc(s.chapter.split(":")[0])} in the book</button>
    <details class="fold" open><summary>Before group</summary>
      ${f.before.map(b=>`<label class="checkitem"><input type="checkbox"><span>${esc(b)}</span></label>`).join("")}</details>
    <details class="fold"><summary>Confidentiality script (read aloud)</summary>
      <div class="readaloud" style="margin-top:8px">${esc(C.facConf)}</div></details>
    <div class="runbar"><div><p class="tiny" style="margin:0">GROUP CLOCK</p><span class="clock" id="runclock">90:00</span></div>
      <div style="flex:1"><p class="tiny" style="margin:0" id="runphase">Not started</p><span class="clock" id="phclock" style="font-size:1rem">–</span></div>
      <button class="btn small" id="runbtn" onclick="facNext(${n})">Start group</button></div>
    ${phases}
    <div class="sect"><h3>Documentation prompt — group note</h3></div>
    <div class="card"><p class="muted" style="font-size:.88rem;white-space:pre-wrap">${esc(f.docPrompt.replace(/ \/ /g,"\n\n"))}</p>
      <button class="btn sec small" style="margin-top:8px" onclick="facCopy(${n})">Copy note scaffold</button><span class="tiny" id="copymsg"></span></div>
    <div class="sect"><h3>Chapter-specific containment</h3></div>
    <p class="muted">${esc(f.containment)}</p>
    <div class="sect"><h3>After group — facilitator self-check</h3></div>
    ${f.selfCheck.map(c=>`<p class="stepp">• ${esc(c)}</p>`).join("")}
    <p class="tiny" style="text-align:center;margin-top:16px">Nothing on this screen is saved. Chart in KIPU; keep guest details off personal devices.</p>
  </div>`;
}
function facFmt(sec){const m=Math.floor(Math.abs(sec)/60),s2=Math.abs(sec)%60;return (sec<0?"-":"")+m+":"+(s2<10?"0":"")+s2;}
function facTick(){
  const s=SS[RUN.n-1]; if(!s)return;
  const now=Date.now();
  const totalLeft=90*60-Math.floor((now-RUN.t0)/1000);
  const a=s.fac.arc[RUN.phase];
  const phLeft=a.min*60-Math.floor((now-RUN.p0)/1000);
  const rc=document.getElementById("runclock"), pc=document.getElementById("phclock");
  if(!rc){facStop();return;}
  rc.textContent=facFmt(totalLeft); rc.classList.toggle("over",totalLeft<0);
  pc.textContent=facFmt(phLeft); pc.classList.toggle("over",phLeft<0);
}
function facNext(n){
  const s=SS[n-1], last=s.fac.arc.length-1;
  if(RUN.n!==n||RUN.phase<0){RUN={n:n,phase:0,t0:Date.now(),p0:Date.now(),iv:setInterval(facTick,1000)};}
  else if(RUN.phase<last){RUN.phase++;RUN.p0=Date.now();}
  else{facStop();document.getElementById("runphase").textContent="Group complete";document.getElementById("phclock").textContent="–";document.getElementById("runbtn").textContent="Start again";RUN.phase=-1;
    s.fac.arc.forEach((a,i)=>{const el=document.getElementById("ph"+i);el.classList.remove("cur");el.classList.add("past");});return;}
  const a=s.fac.arc[RUN.phase];
  document.getElementById("runphase").textContent="Phase "+(RUN.phase+1)+" of "+s.fac.arc.length+" — "+a.name;
  document.getElementById("runbtn").textContent=RUN.phase<last?"Next phase":"End group";
  s.fac.arc.forEach((x,i)=>{const el=document.getElementById("ph"+i);
    el.classList.toggle("cur",i===RUN.phase);el.classList.toggle("past",i<RUN.phase);});
  const cel=document.getElementById("ph"+RUN.phase);if(cel.scrollIntoView)cel.scrollIntoView({behavior:"smooth",block:"start"});
  facTick();
}
function facStop(){if(RUN.iv){clearInterval(RUN.iv);RUN.iv=0;}}
function facCopy(n){
  const s=SS[n-1];
  const txt=s.fac.docPrompt.replace(/ \/ /g,"\n\n");
  const done=()=>{const m=document.getElementById("copymsg");if(m)m.textContent=" Copied.";};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(txt).then(done).catch(done);}else{done();}
}
render();
</script>

</body>
</html>
